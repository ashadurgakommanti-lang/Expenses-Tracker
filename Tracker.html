<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
       <link rel="stylesheet" href="Tracker.css">
  </head> 
  
  <body>
    <div class="Header-Tracker">
        <div class="Tracker-Heading">
        <h3> Expenses <br> Tracker <img src="./Expences_Icon.jpg" alt="" width=45px height="35px"> </h3>
        </div>
    </div>

<div class="form">
    <div class="form-floating inputs">
      <input type="date" class="form-control dateInput" id="floatingInput" placeholder="name@example.com">
      <label for="floatingInput"> Date </label>
    </div>

     <div class="form-floating inputs">
      <input type="number" class="form-control amountInput" id="floatingInput" placeholder="name@example.com">
      <label for="floatingInput"> Amount </label>
    </div>
    <select class="form-select inputs trasactionType" aria-label="Default select example">
     <option selected>Trasaction Type</option>
     <option value="Income"> Income </option>
     <option value="Expenses"> Expenses</option>
   </select>
    <button class=" " id="add-button" onclick="addrow()"> + </button>

</div>
<div class="cards">

<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">Total Income <img src="Total_Expen.jpg" alt="" width="35px" height="35px"> </h5>
    <h1 class="m-0">
        <i class="fa-solid fa-indian-rupee-sign"></i>
        <span class="" id="Total-income">0 </span>
    </h1>
    </div>
</div>

<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title"> Total Expenses <img src="Total-income.jpg" alt="" width="35px" height="35px"></h5>
    <h1 class="m-0">
      <i class="fa-solid fa-indian-rupee-sign"></i>
      <span class= " " id="Total-expense">0</span>
    </h1>
  </div>
</div>

<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">Total Balance <img src="Total-bal.png" alt="" width="35px" height="35px"></h5>
    <h1 class="m-0">
          <i class="fa-solid fa-indian-rupee-sign"></i>
          <span class=" " id="total-bal">0</span>
    </h1>
    
  </div>
</div>
</div>


<table class="trasaction-table" id="table">
    <tr id="header-table">
        <th> Amount </th>
        <th>Trasaction Type </th>
        <th>Trasaction Date </th>
        <th>Action</th>
    </tr>
    <tr>
        <td> 10,499 </td>
        <td> Income </td>
        <td>30-01-2025 </td>
        <td><button class="btn btn-md  delete-button">
            <i class="fa-regular fa-trash-can"></i>
        </button></td>
    </tr>
</table>


<script>



let table = document.getElementById('table')
console.log(table);

function deleterow(row){
  console.log(row);
  row.remove();

} 

 function addrow(){
  let date = document.getElementsByClassName('dateInput')[0].value
  let amount = document.getElementsByClassName('amountInput')[0].value
  let trasactionType = document.getElementsByClassName('trasactionType')[0].value

  if (date === "" || amount === "" || trasactionType === "") {
    alert("Please fill Date, Amount and Transaction Type!"); 
    return;
  }

  let row = document.createElement('tr')

  let amountCell = document.createElement('td')
  amountCell.innerText = amount;

  let trasactionCell = document.createElement('td')
  trasactionCell.innerText =trasactionType;

  let dateCell = document.createElement('td')
  dateCell.innerText = date;

  let deleteCell = document.createElement('td')
  
  let deleteButton = document.createElement('button')
  
  let deleteImg = document.createElement('i')
  deleteImg .className="fa-regular fa-trash-can";
  deleteButton.classList.add('delete-button')
  deleteButton.onclick=()=> deleterow(row)
  

  deleteButton.appendChild(deleteImg)
  deleteCell.appendChild(deleteButton)



  row.appendChild(amountCell)
  row.appendChild(trasactionCell)
  row.appendChild(dateCell)
  row.appendChild(deleteCell)

  table.appendChild(row)
      
let totalIncome = document.getElementById('Total-income').innerText
let totalExpenses = document.getElementById('Total-expense').innerText
let balance = document.getElementById('total-bal').innerText

 if (trasactionType=='Income'){
   
  if(totalIncome== "0"){
    document.getElementById('Total-income').innerText = amount
  }
  else{
   document.getElementById('Total-income').innerText = parseInt(totalIncome)+parseInt(amount)
  }
  if(balance=="0"){
    document.getElementById('total-bal').innerText=amount
  }
  else{
    document.getElementById('total-bal').innerText=parseInt(balance)+parseInt(amount)
  }
 }
 else if (trasactionType =='Expenses'){
  if(totalExpenses== "0"){
    document.getElementById('Total-expense').innerText=amount
  }
  else {
    document.getElementById('Total-expense').innerText=parseInt(totalExpenses)+parseInt(amount)
  }
   if(balance=="0"){
    document.getElementById('total-bal').innerText=amount
  }
  else{
    document.getElementById('total-bal').innerText=parseInt(balance)-parseInt(amount)
  }
  
 }

  console.log(totalIncome, totalExpenses, balance);
 }
</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </body>
</html>
